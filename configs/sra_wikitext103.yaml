# ==============================================================================
# SRA Production Config — Golden Recipe
# Best result: PPL 12.20 (256 experts x d_ff=512, K=1->4@ep3, alpha=0.4, tau=10.0)
# ==============================================================================

project:
  name: SR-Research-WT103
  experiment_name: "SRA Production"
  output_dir: ./outputs/
  seed: 19

hardware:
  use_amp: true
  amp_dtype: bf16

data:
  dataset_name: wikitext-103
  data_dir: ./data/raw/wikitext-103/
  processed_dir: ./data/processed/wikitext-103/
  tokenizer_path: ./data/tokenizers/sra_bpe_32k_wt103.json
  vocab_size: 32000
  max_seq_length: 256

model:
  d_model: 512
  n_layers: 4
  n_heads: 8
  d_ff: 1024
  dropout: 0.1
  activation: gelu
  max_seq_length: 256
  csr:
    enabled: true
    num_experts: 256
    top_k: 1
    d_ff: 512
    anchor_init: orthogonal
    routing_type: cosine
    temperature_scaling: true
    temperature_init: 10.0
    progressive_top_k:
      enabled: true
      schedule:
      - epoch: 1
        top_k: 1
      - epoch: 3
        top_k: 4

losses:
  balance_weight: 0.4
  loss_type: bandpass
  bandpass_min_pct: 0.001
  bandpass_max_pct: 0.02

training:
  batch_size_per_gpu: 64
  gradient_accumulation_steps: 2
  epochs: 10
  learning_rate: 0.0003
  max_grad_norm: 1.0
  optimizer: AdamW
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-08
  scheduler: cosine
  warmup_steps: 4000

logging:
  use_wandb: true
  log_interval: 100
  eval_interval: 2000
